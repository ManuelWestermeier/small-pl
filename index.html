<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmallPL</title>
    <style>
        * {
            border: 1px solid;
        }
    </style>
</head>

<body>
    <canvas id="c1"></canvas>
    <p>Setup</p>
    <textarea value="" id="t1"></textarea>
    <p>Start</p>
    <textarea value="" id="t2"></textarea>
    <p>Loop</p>
    <textarea value="" id="t3"></textarea>

    <script>
        const t1 = document.getElementById("t1")
        const t2 = document.getElementById("t2")
        const t3 = document.getElementById("t3")

        t1.value = `SET X NUM 2\nPOS A1\nALERT X\nDELAY 1000\nMATH X X * X\nLOG X\nGOTO A1\n`

        const c1 = document.getElementById("c1")

        const vars = {}

        const commands = {
            "SET": async (name, t, ...value) => {
                let val
                if(t == "STR") val = value.join(" ")
                if(t == "NUM") val = parseFloat(value[0])
                else val = vars[value[0]]
                vars[name] = val
            },
            "DEL": async (name) => {
                delete vars[name]
            },
            "LOG": async (name) => {
                console.log(vars[name])
            },
            "ALERT": async (name) => {
                alert(vars[name])
            },
            "MATH": async (outName, a1, op, a2) => {
                switch (op) {
                    case "+": vars[outName] = vars[a1] + vars[a2]; break;
                    case "-": vars[outName] = vars[a1] - vars[a2]; break;
                    case "*": vars[outName] = vars[a1] * vars[a2]; break;
                    case "**": vars[outName] = vars[a1] ** vars[a2]; break;
                    case "/": vars[outName] = vars[a1] / vars[a2]; break;
                }
            },
            "DELAY": (time) => {
                return new Promise(res => setTimeout(res, parseInt(time)))
            },
        }

        async function run(line = "", lineNum = 0, lines = [""]) {
            if (line === "") return lineNum + 1;
            if (!line) return -1;

            const [cmd, ...args] = line.split(" ")
            // console.log(cmd, args)
            // alert(cmd)

            if (lineNum == lines.length) {
                return -1
            }
            if (cmd == "EXIT") {
                return -1
            }
            else if (cmd == "GOTO") {
                const l1 = lines.findIndex((v) => v.split(" ")[1] == args[0])
                if (l1 == -1) alert("Cannot find: " + args[0])
                return l1
            }
            else if (cmd == "POS") {
                return lineNum + 1
            }
            else {
                try {
                    await commands[cmd](...args);
                    return lineNum + 1
                } catch (error) {
                    alert(line + error)
                    return -1
                }
            }

            return lineNum + 1
        }

        async function execute(inp = "") {
            const lines = inp.split("\n")
            console.log(lines);

            var line = 0

            while (1) {
                const l = await run(lines[line], line, lines)
                if (l == -1) return
                line = l
            }
        }

        execute(t1.value)
    </script>
</body>

</html>
